server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Absorb stale legacy-dashboard calls from already-open browser tabs.
    # These endpoints no longer proxy to any bridge service.
    location = /api/status {
        access_log off;
        default_type application/json;
        return 200 '{"status":"deprecated","gateway_running":true,"service":"ai-workflow-control-plane"}';
    }

    location ~ ^/api/(logs|config|skills|plugins)$ {
        access_log off;
        default_type application/json;
        return 200 '{}';
    }

    location = /api/model/info {
        access_log off;
        default_type application/json;
        return 200 '{}';
    }

    location = /api/cron/jobs {
        access_log off;
        default_type application/json;
        return 200 '{"jobs":[]}';
    }

    location = /api/analytics/usage {
        access_log off;
        default_type application/json;
        return 200 '{"usage":[]}';
    }

    # Proxy health check to backend
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy SSE to backend
    location /sse {
        proxy_pass http://backend:8000/sse;
        proxy_http_version 1.1;
        proxy_set_header Accept 'text/event-stream';
        proxy_set_header Cache-Control 'no-cache';
        proxy_set_header Connection 'keep-alive';
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
